<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寶可夢卡牌展示</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 2rem;
      font-weight: bold;
      background: rgba(0,0,0,0.3);
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      color: black;
      border-radius: 15px;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card h3 {
      margin: 10px 0 5px;
    }

    .search-box {
      margin: 20px;
    }

    input {
      padding: 10px;
      width: 200px;
      border-radius: 10px;
      border: none;
    }
  </style>
</head>
<body>

<header>⚡ 寶可夢卡牌展示網站</header>

<div class="search-box">
  <input type="text" id="search" placeholder="搜尋寶可夢..." onkeyup="searchCard()">
</div>

<div class="container" id="cardContainer">
  <div class="card" data-name="pikachu">
