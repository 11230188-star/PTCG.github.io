<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寶可夢卡牌展示 (API版)</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 2rem;
      font-weight: bold;
      background: rgba(0,0,0,0.3);
    }

    .search-box {
      margin: 20px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 10px;
      border: none;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      color: black;
      border-radius: 15px;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 120px;
    }
  </style>
</head>
<body>

<header>⚡ 寶可夢卡牌展示 (API)</header>

<div class="search-box">
  <input type="text" id="search" placeholder="輸入寶可夢名稱 (英文)...">
  <button onclick="searchPokemon()">搜尋</button>
</div>

<div class="container" id="cardContainer"></div>

<script>
const container = document.getElementById('cardContainer');

  
window.onload = () => {
  loadPokemons(1, 12);
};

async function loadPokemons(start, count) {
  container.innerHTML = '';
  for (let i = start; i < start + count; i++) {
    const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${i}`);
    const data = await res.json();
    createCard(data);
  }
}
