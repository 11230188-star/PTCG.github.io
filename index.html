<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>PTCG 準備介面</title>
<style>
body {
    font-family: Arial;
    background: #2c3e50;
    color: white;
    text-align: center;
}

.area {
    border: 2px solid #fff;
    padding: 10px;
    margin: 10px;
}

.hand, .field {
    display: flex;
    justify-content: center;
    gap: 10px;
}

.card {
    width: 80px;
    height: 120px;
    background: #ecf0f1;
    color: black;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>PTCG 準備畫面</h1>

<div class="area">
    <h2>手牌</h2>
    <div class="hand" id="hand"></div>
</div>

<div class="area">
    <h2>場上寶可夢</h2>
    <div class="field" id="field"></div>
</div>

<button onclick="drawCard()">抽牌</button>

<script>
let deck = ["皮卡丘", "小火龍", "傑尼龜", "妙蛙種子", "能量卡", "訓練家"];
let hand = [];

function drawCard() {
    if (deck.length === 0) return;

    let card = deck.pop();
    hand.push(card);
    renderHand();
}

function renderHand() {
    let handDiv = document.getElementById("hand");
    handDiv.innerHTML = "";

    hand.forEach((card, index) => {
        let div = document.createElement("div");
        div.className = "card";
        div.innerText = card;

        div.onclick = () => playCard(index);

        handDiv.appendChild(div);
    });
}

function playCard(index) {
    let card = hand.splice(index, 1)[0];
    let field = document.getElementById("field");

    let div = document.createElement("div");
    div.className = "card";
    div.innerText = card;

    field.appendChild(div);
    renderHand();
}
</script>

</body>
</html>
